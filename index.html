<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#09090f;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
.bg-anim{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-anim .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;animation:orb 25s ease-in-out infinite}
.bg-anim .orb:nth-child(1){width:700px;height:700px;background:#6366f1;top:-25%;left:-15%;animation-delay:0s}
.bg-anim .orb:nth-child(2){width:600px;height:600px;background:#a78bfa;bottom:-25%;right:-15%;animation-delay:-8s}
.bg-anim .orb:nth-child(3){width:500px;height:500px;background:#06b6d4;top:50%;left:50%;animation-delay:-16s;opacity:.08}
.bg-anim .orb:nth-child(4){width:400px;height:400px;background:#f472b6;top:10%;right:30%;animation-delay:-24s;opacity:.06}
@keyframes orb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-40px) scale(1.15)}66%{transform:translate(-30px,30px) scale(.85)}}
nav{position:fixed;top:0;width:100%;z-index:100;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(9,9,15,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.05)}
nav .logo{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
nav .logo .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(99,102,241,.2);color:#818cf8;letter-spacing:0}
.chips{position:relative;z-index:2;display:flex;gap:6px;flex-wrap:wrap;padding:72px 24px 8px;max-width:800px;margin:0 auto;justify-content:center}
.chips button{font-size:12px;padding:6px 16px;border-radius:99px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;color:rgba(255,255,255,.5);transition:all .25s;font-family:'Inter',sans-serif;font-weight:500;backdrop-filter:blur(8px)}
.chips button:hover{border-color:#6366f1;color:#fff;background:rgba(99,102,241,.12);transform:translateY(-1px)}
.chips button.active{border-color:#6366f1;color:#fff;background:rgba(99,102,241,.15)}
.chat{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%;padding-top:0}
.msgs{flex:1;overflow-y:auto;padding:16px 24px 8px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.msg{display:flex;gap:10px;max-width:88%;animation:fadeUp .35s ease-out;opacity:0;animation-fill-mode:forwards}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg .av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.ai .av{background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;font-size:10px}
.msg.user .av{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.1);font-size:11px}
.msg .bubble{padding:10px 16px;border-radius:14px;font-size:14px;line-height:1.6;color:#e5e7eb}
.msg.ai .bubble{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-top-left-radius:4px;box-shadow:0 2px 20px rgba(0,0,0,.2)}
.msg.user .bubble{background:#6366f1;color:#fff;border-top-right-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.typing{display:none;align-self:flex-start;align-items:center;gap:10px;padding:10px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:14px;border-top-left-radius:4px;max-width:88%;margin-left:24px;animation:fadeUp .3s ease-out}
.typing .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.typing .dots{display:flex;gap:4px}
.typing .dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);animation:typing 1.4s infinite}
.typing .dots span:nth-child(2){animation-delay:.2s}
.typing .dots span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.input-area{padding:10px 24px 20px;border-top:1px solid rgba(255,255,255,.05);background:rgba(9,9,15,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.token-row{display:flex;align-items:center;max-width:800px;margin:0 auto 8px;gap:8px}
.token-row label{font-size:11px;color:rgba(255,255,255,.25);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.token-row input{flex:1;padding:7px 12px;border:1px solid rgba(255,255,255,.06);border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);transition:all .2s;max-width:280px}
.token-row input:focus{border-color:#6366f1;color:#fff;background:rgba(99,102,241,.05)}
.token-row input::placeholder{color:rgba(255,255,255,.2)}
.token-row .gh-info{font-size:11px;color:rgba(255,255,255,.2);cursor:help}
.input-row{display:flex;gap:8px;align-items:flex-end;max-width:800px;margin:0 auto}
.input-row .wrap{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:3px;transition:all .25s;display:flex;align-items:flex-end}
.input-row .wrap:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.input-row textarea{flex:1;border:none;outline:none;background:transparent;color:#fff;font-size:14px;font-family:'Inter',sans-serif;padding:9px 14px;resize:none;min-height:42px;max-height:120px;line-height:1.5}
.input-row textarea::placeholder{color:rgba(255,255,255,.2)}
.input-row .send{width:38px;height:38px;border-radius:9px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:2px}
.input-row .send:hover{background:#4f46e5;transform:scale(1.05)}
.input-row .send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.msg .bubble .steps{margin:4px 0}
.msg .bubble .step{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:rgba(255,255,255,.6)}
.msg .bubble .step .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.1);transition:all .3s}
.msg .bubble .step.done{color:rgba(255,255,255,.8)}
.msg .bubble .step.done .dot{background:#10b981;box-shadow:0 0 8px rgba(16,185,129,.3)}
.msg .bubble .step.active{color:#fff}
.msg .bubble .step.active .dot{background:#6366f1;box-shadow:0 0 10px rgba(99,102,241,.5);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.msg .bubble .url{font-size:17px;font-weight:700;margin:10px 0 4px;word-break:break-all}
.msg .bubble .url a{background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.msg .bubble .url a:hover{text-decoration:underline}
.msg .bubble .sub{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:12px}
.msg .bubble .refine-row{display:flex;gap:8px;margin-top:10px}
.msg .bubble .refine-row input{flex:1;padding:9px 12px;border:1px solid rgba(255,255,255,.08);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:rgba(255,255,255,.04);color:#fff;transition:border-color .2s}
.msg .bubble .refine-row input:focus{border-color:#6366f1}
.msg .bubble .refine-row input::placeholder{color:rgba(255,255,255,.25)}
.msg .bubble .refine-row button{padding:9px 14px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;transition:all .2s;white-space:nowrap}
.msg .bubble .refine-row button:hover{transform:translateY(-1px)}
.status-msg .bubble{min-width:300px}
@media(max-width:640px){.msg{max-width:95%}.msgs{padding:12px 16px 8px}.chips{padding:68px 12px 6px;gap:4px}.chips button{font-size:11px;padding:4px 12px}.input-area{padding:8px 12px 16px}.token-row{flex-direction:column;align-items:stretch}.token-row input{max-width:100%}}
</style>
</head>

<nav>

>{{R2S}}</span></td><td>{{R2V}}</td></tr><tr><td>{{R3N}}</td><td><span class="bdg {{R3C}}">{{R3S}}</span></td><td>{{R3V}}</td></tr></tbody></table></div></div><div><div class="ci"><h3>Recent Activity</h3><div class="act"><span class="tx">{{A1}}</span></div><div class="act"><span class="tx">{{A2}}</span></div><div class="act"><span class="tx">{{A3}}</span></div></div></div></div></div></body></html>';

const SS = {modern:{bg:"#fff",bg2:"#f8fafc",text:"#0f172a",text2:"#64748b",accent:"#2563eb",accent2:"#3b82f6",font:'"Inter",system-ui,sans-serif'},minimal:{bg:"#fff",bg2:"#f5f5f5",text:"#1a1a1a",text2:"#888",accent:"#000",accent2:"#333",font:'system-ui,-apple-system,sans-serif'},bold:{bg:"#0f0f0f",bg2:"#1a1a1a",text:"#fff",text2:"#aaa",accent:"#ff2d55",accent2:"#ff6b8a",font:'"Poppins",system-ui,sans-serif'},elegant:{bg:"#fcf9f5",bg2:"#f5f0ea",text:"#2d2a24",text2:"#8c8579",accent:"#c9a96e",accent2:"#d4bc8a",font:'"Playfair Display",Georgia,serif'},playful:{bg:"#fef9ef",bg2:"#fff",text:"#2d2d2d",text2:"#888",accent:"#ff6b9d",accent2:"#ff8fb5",font:'system-ui,-apple-system,sans-serif'},dark:{bg:"#0a0a0a",bg2:"#141414",bg3:"#1e1e1e",text:"#f5f5f5",text2:"#888",text3:"#555",accent:"#06b6d4",accent2:"#22d3ee",font:'"Inter",system-ui,sans-serif'}};

const $ = id => document.getElementById(id);
function fillP(t){$("prompt").value=t;$("prompt").focus()}
function selT(el,v){document.querySelectorAll(".t-card").forEach(c=>c.classList.remove("active"));el.classList.add("active");$("st").value=v}
function st(n,s){const e=$("s"+n);e.classList.remove("active","done","fail");if(s)e.classList.add(s)}

let currentHTML = "";
let currentOwner = "";
let currentRepo = "";

async function generate(){
  const siteType=$("st").value,style=$("ds").value,prompt=$("prompt").value.trim(),token=$("gt").value.trim();
  let sn=$("sn").value.trim();
  if(!prompt){showE("Describe your website.");return}
  if(!token){showE("Enter your GitHub token.");return}
  $("gb").disabled=true;$("gb").textContent="Planning...";
  for(let i=1;i<=5;i++)st(i,"");
  $("output").style.display="none";
  $("refineBox").style.display="none";
  try{
    st(1,"active");
    const plan = await callAI(`You are a senior web architect. Create a detailed plan for a ${siteType} website (${style} style). User request: "${prompt}"

Return ONLY a JSON object with this structure:
{
  "sections": ["hero", "features", "gallery", "skills", "testimonials", "contact", "footer"],
  "targetAudience": "brief description",
  "tone": "professional/creative/playful/etc",
  "contentStrategy": "brief strategy",
  "palette": "3-5 hex colors"
}`, token);
    st(1,"done");
    
    st(2,"active");
    const content = await callAI(`You are a senior copywriter. Generate professional, detailed content for a ${siteType} website based on this plan: ${plan}

User request: "${prompt}"
Style: ${style}

Return ONLY a JSON object. For each placeholder in the template, provide specific, realistic content. Use real-sounding names, numbers, and details. Make it compelling and professional.`, token);
    st(2,"done");

    st(3,"active");
    const tmpl = TX[siteType];
    const sty = SS[style];
    const html = await buildHTML(tmpl, sty, prompt, plan, content, siteType, style, token);
    currentHTML = html;
    st(3,"done");

    if(!sn)sn="s"+Date.now().toString(36);
    st(4,"active");
    const r = await createRepo(sn,token,prompt);
    currentOwner = r.owner; currentRepo = r.repo;
    st(4,"done");
    
    st(5,"active");
    await pushFile(r.owner,r.repo,html,token);
    await enablePages(r.owner,r.repo,token);
    st(5,"done");

    showOK(`https://${r.owner}.github.io/${r.repo}/`);
    $("refineBox").style.display="block";
  }catch(e){showE(e.message);document.querySelectorAll(".status-item.active").forEach(x=>st(x.id.replace("s",""),"fail"))}
  finally{$("gb").disabled=false;$("gb").textContent="Start the build"}
}

async function callAI(msg, token){
  const r=await fetch("https://models.inference.ai.azure.com/chat/completions",{
    method:"POST",
    headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({model:"gpt-4o",messages:[{role:"user",content:msg}]})
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||"AI API error");
  return d.choices?.[0]?.message?.content||"";
}

async function buildHTML(tmpl,sty,prompt,plan,content,siteType,style,token){
  const sys = `You are a senior front-end developer. You are given an HTML template with {{PLACEHOLDERS}}.

TASK: Fill in ALL placeholders with specific, realistic content matching:
- User request: "${prompt}"
- Architecture plan: ${plan.slice(0,500)}
- Generated content: ${content.slice(0,1000)}
- Site type: ${siteType}
- Design style: ${style}

CSS VARIABLES TO SET EXACTLY:
--bg:${sty.bg}; --bg2:${sty.bg2}; --text:${sty.text}; --text2:${sty.text2}; --accent:${sty.accent}; --accent2:${sty.accent2}; --font:${sty.font}

RULES:
1. Replace EVERY {{PLACEHOLDER}} with detailed, professional content
2. Keep EXACT HTML structure. Only change content and CSS vars.
3. For gallery project placeholders, use emoji icons like 🎨 📸 🎬 ✏️ 💻 📱 🎵
4. For team member initials, use real first+last initials
5. For numbers/stats, use realistic figures
6. For badge class, use only "s" (success), "w" (warning), or "p" (pending)
7. Return ONLY the raw HTML. No markdown, no backticks, no explanation`;
  
  const r=await fetch("https://models.inference.ai.azure.com/chat/completions",{
    method:"POST",
    headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({model:"gpt-4o",messages:[{role:"system",content:sys+"\n\n---TEMPLATE---\n"+tmpl}]})
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||"AI API error");
  let h=d.choices?.[0]?.message?.content||"";
  h=h.replace(/```html?/gi,"").replace(/```/g,"").trim();
  if(!h)throw new Error("AI returned empty");
  return h;
}

async function refine(){
  const prompt=$("refineInput").value.trim();
  if(!prompt){showE("Describe what to change.");return}
  if(!currentHTML){showE("Build a site first.");return}
  $("refineInput").disabled=true;
  st(1,"active");
  try{
    const r=await fetch("https://models.inference.ai.azure.com/chat/completions",{
      method:"POST",
      headers:{"Authorization":"Bearer "+$("gt").value,"Content-Type":"application/json"},
      body:JSON.stringify({model:"gpt-4o",messages:[{role:"system",content:"You are a front-end developer. Modify the given HTML according to the user's request. Keep the same structure. Return ONLY the raw HTML."},{role:"user",content:"Modify this HTML: " + prompt + "\n\n```html\n" + currentHTML + "\n```"}]
    })});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error?.message||"AI error");
    let h=d.choices?.[0]?.message?.content||"";
    h=h.replace(/```html?/gi,"").replace(/```/g,"").trim();
    if(h)currentHTML=h;
    st(1,"done");
    showOK("Refined! Click 'Publish Now' to update the live site.");
  }catch(e){showE(e.message);st(1,"fail")}
  finally{$("refineInput").disabled=false;$("refineInput").value=""}
}

async function publishRefined(){
  if(!currentOwner||!currentRepo||!currentHTML){showE("Build and refine a site first.");return}
  $("refineInput").disabled=true;
  try{
    await pushFile(currentOwner,currentRepo,currentHTML,$("gt").value);
    showOK(`Updated! https://${currentOwner}.github.io/${currentRepo}/`);
  }catch(e){showE(e.message)}
  finally{$("refineInput").disabled=false}
}

async function createRepo(n,t,p){
  const r=await fetch("https://api.github.com/user/repos",{method:"POST",headers:{"Authorization":"token "+t,"Content-Type":"application/json"},body:JSON.stringify({name:n,description:"Created by AI Website Maker: "+p.slice(0,100),auto_init:false,private:false})});
  if(!r.ok){const e=await r.json();if(r.status===422)throw new Error('Repo "'+n+'" exists. Pick another.');throw new Error(e.message||"Failed to create repo")}
  return await r.json();
}

async function pushFile(o,r,c,t){
  const enc=btoa(unescape(encodeURIComponent(c)));
  const res=await fetch("https://api.github.com/repos/"+o+"/"+r+"/contents/index.html",{method:"PUT",headers:{"Authorization":"token "+t,"Content-Type":"application/json"},body:JSON.stringify({message:"Add generated website",content:enc,branch:"main"})});
  if(!res.ok){const e=await res.json();throw new Error(e.message||"Failed to push")}
}

async function enablePages(o,r,t){
  const res=await fetch("https://api.github.com/repos/"+o+"/"+r+"/pages",{method:"POST",headers:{"Authorization":"token "+t,"Content-Type":"application/json"},body:JSON.stringify({source:{branch:"main",path:"/"}})});
  if(!res.ok){const e=await res.json();if(e.status!==403&&e.status!==409)throw new Error(e.message||"Failed Pages")}
}

function showOK(u){
  const o=$("output");o.style.display="block";o.className="";
  o.innerHTML='<strong>Published!</strong><div class="url"><a href="'+u+'" target="_blank">'+u+'</a></div><div style="font-size:14px;color:#666">Live in ~1-2 minutes. Use the refine box below to make changes.</div>'
}
function showE(m){const o=$("output");o.style.display="block";o.className="error";o.textContent="Error: "+m}

// ===== CHAT UI =====
let chatState = 'idle';
let chatSiteType = 'portfolio';
let chatStyle = 'modern';
let chatPrompt = '';

function addMsg(text, sender, html) {
  const msgs = $('msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.innerHTML = '<div class="av">' + (sender === 'ai' ? 'AI' : 'U') + '</div><div class="bubble">' + (html || text || '') + '</div>';
  msgs.appendChild(div);
  scrollChat();
}

function scrollChat() {
  const msgs = $('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  $('typing').style.display = 'flex';
  scrollChat();
}

function hideTyping() {
  $('typing').style.display = 'none';
}

function handleChat() {
  if (chatState === 'building') return;
  const input = $('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg(text, 'user');
  chatPrompt = text;
  $('sendBtn').disabled = true;
  triggerBuild();
}

function chatChip(type) {
  if (chatState === 'building') return;
  chatSiteType = type;
  document.querySelectorAll('.chips button').forEach(b => b.classList.remove('active'));
  const idx = {portfolio:0,landing:1,business:2,blog:3,store:4,app:5}[type];
  if (idx !== undefined) document.querySelectorAll('.chips button')[idx].classList.add('active');
  const names = {portfolio:'🎨 Portfolio',landing:'🚀 Landing',business:'🏢 Business',blog:'📝 Blog',store:'🛍️ Store',app:'📊 Web App'};
  addMsg(names[type], 'user');
  if (!chatPrompt) {
    addMsg(null, 'ai', 'Got it. Tell me what kind of ' + type + ' site you need — describe the vibe, features, colors, anything you want.');
    return;
  }
  $('sendBtn').disabled = true;
  triggerBuild();
}

function triggerBuild() {
  const token = document.getElementById('gt').value.trim();
  if (!token) {
    addMsg(null, 'ai', '❌ Need your GitHub classic token first. Paste it in the TOKEN field above (get one at github.com/settings/tokens with <b>repo</b> scope).');
    chatState = 'idle';
    $('sendBtn').disabled = false;
    return;
  }
  $('st').value = chatSiteType;
  $('ds').value = chatStyle;
  $('prompt').value = chatPrompt;
  showTyping();
  generate();
}

const origSt = window.st;
let statusBubble = null;
let stepsInited = false;

window.st = function(n, s) {
  if (origSt) origSt(n, s);
  const stepTexts = ['Planning site architecture...', 'Generating content & copy...', 'Building professional HTML...', 'Creating GitHub repository...', 'Publishing to GitHub Pages...'];
  hideTyping();
  if (s === 'active' || s === 'done') {
    if (!statusBubble || (s === 'active' && !stepsInited)) {
      stepsInited = true;
      let html = '<div class="steps">';
      for (let i = 0; i < stepTexts.length; i++) {
        const cls = (i + 1 < n) ? 'done' : (i + 1 === n ? 'active' : '');
        const check = (i + 1 < n) ? '●' : '';
        html += '<div class="step ' + cls + '"><span class="dot">' + check + '</span>' + stepTexts[i] + '</div>';
      }
      html += '</div>';
      addMsg(null, 'ai', html);
      statusBubble = $('msgs').lastElementChild;
    } else if (statusBubble) {
      let html = '<div class="steps">';
      for (let i = 0; i < stepTexts.length; i++) {
        const cls = (i + 1 < n) ? 'done' : (i + 1 === n ? 'active' : '');
        html += '<div class="step ' + cls + '"><span class="dot"></span>' + stepTexts[i] + '</div>';
      }
      html += '</div>';
      statusBubble.querySelector('.bubble').innerHTML = html;
    }
    if (s === 'done') {
      if (n === 3) addMsg(null, 'ai', 'HTML looks solid. Spinning up the repo...');
      if (n === 5) hideTyping();
    }
  }
};

const origShowOK = window.showOK;
window.showOK = function(url) {
  if (origShowOK) origShowOK(url);
  hideTyping();
  if (statusBubble) {
    statusBubble.querySelector('.bubble').innerHTML = '<div style="margin-bottom:8px"><span style="color:#10b981">✓</span> <b>Published!</b></div><div class="url"><a href="' + url + '" target="_blank">' + url + '</a></div><div class="sub">Live in ~1-2 minutes</div><div class="refine-row"><input id="chatRefineInput" placeholder="Tell AI what to change..."><button onclick="chatRefine()" style="background:#10b981;color:#fff">Refine</button><button onclick="chatPublish()" style="background:#6366f1;color:#fff">Publish Now</button></div>';
    statusBubble = null;
  }
  stepsInited = false;
  chatState = 'idle';
  $('sendBtn').disabled = false;
};

const origShowE = window.showE;
window.showE = function(m) {
  if (origShowE) origShowE(m);
  hideTyping();
  if (statusBubble && stepsInited) {
    statusBubble.querySelector('.bubble').innerHTML = '<div style="color:#ef4444">❌ ' + m + '</div>';
    statusBubble = null;
  } else {
    addMsg(null, 'ai', '❌ Error: ' + m);
  }
  stepsInited = false;
  chatState = 'idle';
  $('sendBtn').disabled = false;
};

function chatRefine() {
  const input = document.getElementById('chatRefineInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.disabled = true;
  $('refineInput').value = text;
  refine();
  input.value = '';
  input.disabled = false;
}

function chatPublish() {
  publishRefined();
}

addMsg(null, 'ai', 'Yo. I\'m the best AI website builder you\'ll ever use. <b>Describe your dream site</b> and I\'ll plan, build, and publish it live on GitHub Pages — all with GPT-4o, all for free.<br><br><span style="font-size:13px;color:rgba(255,255,255,.35)">Start by picking a template above or just describe what you want.</span>');

document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleChat();
  }
});
